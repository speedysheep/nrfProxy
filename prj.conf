# ---------------------------------------------------------------------------
# nrfProxy: forward incoming UART1 serial data to a phone over BLE (NUS)
# ---------------------------------------------------------------------------

# --- Bluetooth: BLE peripheral exposing the Nordic UART Service -------------
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="nrfProxy"
CONFIG_BT_MAX_CONN=1

# Per-device identity (see identity_init() in main.c): derive a stable
# random-static BT address and a unique "nrfProxy-XXXX" name suffix from the
# SoC's hardware ID, so multiple units are distinguishable over the air.
# HWINFO exposes that hardware ID; DEVICE_NAME_DYNAMIC lets bt_set_name() set
# the runtime name (MAX must fit "nrfProxy-XXXX").
CONFIG_HWINFO=y
CONFIG_BT_DEVICE_NAME_DYNAMIC=y
CONFIG_BT_DEVICE_NAME_MAX=20

# Nordic UART Service (NUS) — the GATT service the phone subscribes to
CONFIG_BT_NUS=y

# --- Pairing / bond-lock (see PAIRING_PLAN.md) -----------------------------
# Once a phone pairs, only that phone can reconnect: the bond is stored in
# flash, the filter accept list rejects everyone else at the link layer, and
# the link must reach security level 2 (encryption) before NUS data flows.
# A hardware button held during boot wipes the bond (back to pairing mode).
#
# Just Works pairing (no display/keypad -> unauthenticated but encrypted).
# CONFIG_BT_NUS_AUTHEN is deliberately NOT set: it demands MITM-authenticated
# pairing, which Just Works can never satisfy — encryption is enforced in the
# application layer instead (security_changed + a watchdog in main.c).
# MAX_PAIRED=1 makes the stack reject any second bond. These stay in prj.conf
# (not prod.conf): production needs the lock most of all.
CONFIG_BT_SMP=y
CONFIG_BT_BONDABLE=y
CONFIG_BT_MAX_PAIRED=1
CONFIG_BT_FILTER_ACCEPT_LIST=y

# Bond persistence: the settings subsystem stores the LTK/IRK in NVS in the DT
# storage_partition (all four boards define one — no overlay change needed).
# The bond survives power loss until the reset button wipes it.
CONFIG_BT_SETTINGS=y
CONFIG_SETTINGS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y

# Throughput: negotiate a larger ATT MTU and LL data length so we can push
# up to ~244 bytes per notification instead of the 20-byte default.
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251

# --- Serial: async UART driver for the incoming data on UART1 --------------
CONFIG_SERIAL=y
CONFIG_UART_ASYNC_API=y
# uart1 is our async data port. The per-instance UART_1_ASYNC depends on
# !UART_1_INTERRUPT_DRIVEN, and UART_1_INTERRUPT_DRIVEN defaults y whenever
# anything enables CONFIG_UART_INTERRUPT_DRIVEN (e.g. the XIAO BLE's USB CDC
# console). Without this, uart_callback_set() returns -ENOSYS (-88) on those
# boards. Force it off so uart1 keeps the async API everywhere.
CONFIG_UART_1_INTERRUPT_DRIVEN=n

# --- Misc ------------------------------------------------------------------
CONFIG_HEAP_MEM_POOL_SIZE=2048

# GPIO for the status LEDs
CONFIG_GPIO=y

# Logging on the default console (board-dependent: J-Link VCOM on the DK,
# USB CDC-ACM on the XIAO BLE)
CONFIG_LOG=y

# Board-specific debug/optimization settings live in the per-board fragments under
# boards/ that Zephyr auto-merges on top of this file — see README.md
# ("Per-board Kconfig fragments") for the full list.
