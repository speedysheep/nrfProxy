CONFIG_ZTEST=y

# The device under test is the real src/uart_bridge.c, driven against Zephyr's
# emulated UART rather than hardware. UART_EMUL depends on EMUL and defaults y
# once the devicetree node exists (see app.overlay).
CONFIG_SERIAL=y
CONFIG_EMUL=y
CONFIG_UART_EMUL=y

# uart_bridge uses the async API exclusively, as uart1 does on every board.
CONFIG_UART_ASYNC_API=y

CONFIG_RING_BUFFER=y
CONFIG_LOG=y
