# Board-specific Kconfig for the "Pro Micro nRF52840" / nice!nano clone.
# Auto-merged on top of prj.conf by Zephyr for `-b promicro_nrf52840/nrf52840[/uf2]`.
#
# Debug/bring-up build: keep the USB CDC-ACM console + logging (this board has no
# debug UART). For battery/production, layer prod.conf on top via EXTRA_CONF_FILE
# into a separate build dir, exactly like the XIAO (see prod.conf / CLAUDE.md).

# USB device controller buffer pool. The 1024-byte default is too small for the
# large control transfers a Windows host issues during enumeration, so EP0
# allocations fail ("udc: Failed to allocate net_buf 4095, ep 0x80") and log
# output over USB CDC-ACM is disrupted. Size the pool past the request.
# (Same issue as the XIAO — Zephyr issue #85108.)
CONFIG_UDC_BUF_POOL_SIZE=8192

# Note: CONFIG_UART_1_INTERRUPT_DRIVEN=n lives in prj.conf (global) so uart1's
# async API isn't gated by the USB CDC-ACM console's CONFIG_UART_INTERRUPT_DRIVEN
# (the -ENOSYS trap documented in CLAUDE.md). It applies here too.
