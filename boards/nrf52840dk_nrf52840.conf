# Board-specific Kconfig for the nRF52840 DK (bench/debug board).
# Auto-merged on top of prj.conf by Zephyr for `-b nrf52840dk/nrf52840`.
#
# Build at -Og and expose thread info so the SWD/J-Link debugger in VS Code
# can place breakpoints and enumerate threads. The XIAO (production) omits
# these for a smaller/faster -Os build.
CONFIG_DEBUG_OPTIMIZATIONS=y
CONFIG_DEBUG_THREAD_INFO=y
