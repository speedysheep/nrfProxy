# ---------------------------------------------------------------------------
# Production build fragment for the XIAO BLE (battery use).
#
# Apply it with EXTRA_CONF_FILE so it layers on top of prj.conf + the board
# .conf *without* touching the normal build:
#
#   west build -b xiao_ble/nrf52840 -d build_xiao_prod . -- -DEXTRA_CONF_FILE=prod.conf
#
# Goal: let the SoC idle between advertising events. Drops all logging and the
# USB CDC-ACM console the board brings up at boot (no USB enumeration, no log
# thread). UART1 — the actual data path — is unaffected (CONFIG_SERIAL stays y).
# Use the plain `build_xiao` build when you need to read logs for debugging.
# ---------------------------------------------------------------------------

# No logging subsystem / output.
CONFIG_LOG=n

# Drop the USB CDC-ACM serial backend. On the XIAO this Kconfig (default y)
# pulls in the USB device stack and initialises CDC-ACM as the console at boot;
# turning it off removes USB bring-up entirely. The console then has no backend.
CONFIG_BOARD_SERIAL_BACKEND_CDC_ACM=n
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
