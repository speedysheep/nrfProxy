version: 2
updates:
  # GitHub Actions is the only ecosystem that applies here: the repo carries no
  # package manifest, and the nRF Connect SDK version is pinned by the CI
  # workflow's NCS_REV env var — not by anything Dependabot understands.
  # Grouped so action bumps arrive as a single PR.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]
